sonar.projectKey=gaus-1_pandapal-bot
sonar.organization=vyacheslav

# Project metadata
sonar.projectName=pandapal-bot

# Source directories to analyze
sonar.sources=bot,config,frontend/src,server_routes,web_server.py
# Test directories
sonar.tests=tests

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/.venv/**,**/__pycache__/**,**/*.pyc,frontend/tests/**
sonar.coverage.exclusions=**/*_test.py,**/tests/**,frontend/src/**/*.test.tsx

# Python configuration
sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage.xml

# TypeScript configuration
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.sourceEncoding=UTF-8

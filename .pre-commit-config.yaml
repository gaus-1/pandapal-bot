# Pre-commit hooks для PandaPal

repos:
  # Базовые проверки
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: 🧹 Удаление пробелов в конце строк
      - id: end-of-file-fixer
        name: 📄 Исправление конца файлов
      - id: check-yaml
        name: ✅ Проверка YAML синтаксиса
        exclude: ^(frontend/.*\.yml$|\.github/workflows/.*\.yml$)
      - id: check-added-large-files
        name: 📦 Проверка больших файлов (max 5MB)
        args: ['--maxkb=5120']
      - id: check-merge-conflict
        name: ⚠️ Проверка маркеров слияния
      - id: check-json
        name: ✅ Проверка JSON синтаксиса
        exclude: ^(frontend/.*\.json$|.*tsconfig.*\.json$)
      - id: mixed-line-ending
        name: 📝 Проверка окончаний строк
        args: ['--fix=lf']

  # Ruff: форматирование и линтинг (заменяет black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Форматирование кода (заменяет black)
      - id: ruff-format
        name: 🎨 ruff format - форматирование кода
        exclude: ^(tests/|scripts/|alembic/)
      # Линтинг и сортировка импортов (заменяет flake8 + isort)
      - id: ruff
        name: 🔍 ruff - линтинг и сортировка импортов (PEP8)
        args: ['--fix', '--exit-non-zero-on-fix']
        exclude: ^(tests/|scripts/|alembic/)

  # Radon: сложность кода (manual)
  - repo: local
    hooks:
      - id: radon-complexity
        name: 📊 radon - проверка сложности (SOLID)
        entry: powershell -Command "python -m radon cc bot/ --min B --show-complexity --average"
        language: system
        types: [python]
        files: ^bot/.*\.py$
        exclude: ^(tests/|scripts/|alembic/)
        pass_filenames: false
        stages: [manual]  # Запускается вручную: pre-commit run radon-complexity --all-files

  # mypy: типы (manual)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0  # Обновлено с v1.18.2 (была опечатка, актуальная версия)
    hooks:
      - id: mypy
        name: 🔬 mypy - проверка типов (soft)
        additional_dependencies:
          - types-requests
          - types-setuptools
          - types-aiofiles
        args:
          - '--ignore-missing-imports'
          - '--no-strict-optional'
          - '--show-error-codes'
          - '--warn-unused-ignores'
          - '--no-error-summary'
        exclude: ^(tests/|scripts/|alembic/|bot/services/|bot/handlers/)
        # Не блокирует коммит, только предупреждает
        verbose: true
        stages: [manual]  # Запускается только вручную через: git commit --no-verify

  # pylint: SOLID и архитектура
  - repo: https://github.com/pycqa/pylint
    rev: v4.0.2
    hooks:
      - id: pylint
        name: 🔎 pylint - проверка SOLID и архитектуры
        args:
          - '--max-line-length=100'
          - '--disable=C0114,C0115,C0116,R0903,R0913,E0401,W0611,E0013,R0801,C0301'
          - '--fail-under=6.5'  # Мягкий порог для начала
          - '--enable=R0902,R0912'  # Проверка слишком больших классов/функций (SOLID)
        exclude: ^(tests/|scripts/|alembic/|bot/config\.py)
        # Блокирует коммит только при критических ошибках
        # Включен в обычные коммиты (по умолчанию stage: pre-commit)

  # bandit: безопасность (manual)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        name: 🛡️ bandit - проверка безопасности
        args: ['-r', 'bot/', '-ll', '--skip', 'B101,B601,B104', '-f', 'text']
        exclude: ^(tests/|scripts/)
        pass_filenames: false
        verbose: true
        stages: [manual]  # Запускается только вручную: pre-commit run bandit --all-files

  # safety отключен; вручную: safety check
  # - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
  #   rev: v1.3.3
  #   hooks:
  #     - id: python-safety-dependencies
  #       name: 🔒 safety - проверка уязвимостей Python
  #       args: ['--continue-on-failure']
  #       stages: [manual]  # Запускается вручную: pre-commit run python-safety-dependencies --all-files

  - repo: local
    hooks:
      - id: typescript-check
        name: 🔷 TypeScript - проверка типов
        entry: powershell -Command "cd frontend; npm run type-check"
        language: system
        types: [file]
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
        # Запускается автоматически при изменении .ts/.tsx файлов

      - id: eslint
        name: 🔍 ESLint - проверка TypeScript/JavaScript
        entry: powershell -Command "cd frontend; npm run lint"
        language: system
        types: [file]
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
        # Запускается автоматически при изменении .ts/.tsx/.js/.jsx файлов

      - id: npm-audit
        name: 🔒 npm audit - проверка уязвимостей Node.js
        entry: powershell -Command "cd frontend; npm audit --audit-level=moderate"
        language: system
        pass_filenames: false
        always_run: false
        stages: [manual]  # Запускается вручную: pre-commit run npm-audit --all-files

# Обычный коммит: git commit -m "feat: ..."
# Без проверок: git commit --no-verify -m "fix: ..."
# Всё вручную: pre-commit run --all-files
# mypy: pre-commit run mypy --all-files
# bandit: pre-commit run bandit --all-files
# radon: pre-commit run radon-complexity --all-files

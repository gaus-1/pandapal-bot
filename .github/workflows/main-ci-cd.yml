# PandaPal CI/CD Pipeline
# Backend: Python 3.13 + PostgreSQL 17
# Frontend: React 18 + TypeScript + Vite
# Auto-deploy: Railway
#
# Actions по тегам (IDE резолвит без ошибок; на GitHub Actions работают).

name: PandaPal CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '20'
  POSTGRES_VERSION: '17'

jobs:
  # Backend: Python + PostgreSQL
  backend:
    name: 🐍 Backend (Python 3.13)
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      attestations: write

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pandapal_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Lint - flake8 (critical errors only)
        run: |
          pip install flake8
          flake8 bot --count --select=E9,F63,F7,F82 --show-source --statistics || true
        continue-on-error: true

      - name: 🎨 Format check - black
        run: |
          pip install black
          black --check bot
        continue-on-error: true

      - name: 📚 Import sorting - isort
        run: |
          pip install isort
          isort --check-only bot
        continue-on-error: true

      - name: 📦 Apply migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pandapal_test
        run: alembic upgrade head

      - name: 🧪 Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pandapal_test
          TELEGRAM_BOT_TOKEN: 123456789:TEST_TOKEN_FOR_CI
          YANDEX_CLOUD_API_KEY: AQVTEST_KEY_FOR_CI
          YANDEX_CLOUD_FOLDER_ID: b1gTEST_FOLDER_ID_FOR_CI
          YANDEX_GPT_MODEL: yandexgpt-lite
          SECRET_KEY: test_secret_key_32_chars_minimum
          DEBUG: 'True'
        run: |
          pytest tests/ --ignore=tests/performance \
            --ignore=tests/resilience \
            --ignore=tests/integration/test_games_api.py \
            --ignore=tests/integration/test_gamification_real.py \
            --ignore=tests/integration/test_miniapp_endpoints_real.py \
            --ignore=tests/integration/test_miniapp_voice_real_flow.py \
            --ignore=tests/integration/test_moderation_and_yandex_real.py \
            --ignore=tests/integration/test_payments_integration_real.py \
            --ignore=tests/integration/test_rag_real_api.py \
            --ignore=tests/integration/test_real_handlers.py \
            --ignore=tests/integration/test_referral_flow_integration.py \
            --ignore=tests/integration/test_semantic_cache_real.py \
            --ignore=tests/integration/test_telegram_auth_real.py \
            --ignore=tests/integration/test_webhook_and_security_real.py \
            --ignore=tests/integration/test_yandex_api_real.py \
            --ignore=tests/integration/test_yandex_art_real_api.py \
            --ignore=tests/integration/test_yookassa_payments_real.py \
            --ignore=tests/e2e/test_complete_user_journey.py \
            --ignore=tests/e2e/test_comprehensive_panda_e2e.py \
            --ignore=tests/e2e/test_panda_responses_real.py \
            -v --cov=bot --cov-report=xml --cov-report=term-missing

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

      - name: 🐳 Build Docker image (backend)
        id: build-backend
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: pandapal-backend:${{ github.sha }}

      - name: 🔍 Extract image digest (backend)
        id: digest-backend
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.build-backend.outcome == 'success'
        run: |
          image_id=$(docker image inspect pandapal-backend:${{ github.sha }} --format='{{.Id}}' | cut -d':' -f2)
          digest="sha256:$image_id"
          echo "digest=$digest" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: 🔐 Generate build attestation (backend)
        uses: actions/attest-build-provenance@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.digest-backend.outcome == 'success' && steps.digest-backend.outputs.digest != ''
        continue-on-error: true
        with:
          subject-name: 'pandapal-backend'
          subject-digest: '${{ steps.digest-backend.outputs.digest }}'
          push-to-registry: false

  # Frontend: React + TypeScript + Vite
  frontend:
    name: ⚛️ Frontend (React 18)
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      attestations: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🔍 Lint - ESLint
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true

      - name: 🏗️ Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: 🎭 E2E smoke (Playwright)
        working-directory: ./frontend
        env:
          TEST_LOCAL: '1'
        run: |
          npx playwright install chromium
          npx playwright test --project=chromium miniapp.smoke.spec.ts website.functionality.spec.ts website.responsive.spec.ts

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

      - name: 🐳 Set up Docker Buildx (frontend)
        uses: docker/setup-buildx-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: 🐳 Build Docker image (frontend)
        id: build-frontend
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: pandapal-frontend:${{ github.sha }}

      - name: 🔍 Extract image digest (frontend)
        id: digest-frontend
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.build-frontend.outcome == 'success'
        run: |
          image_id=$(docker image inspect pandapal-frontend:${{ github.sha }} --format='{{.Id}}' | cut -d':' -f2)
          digest="sha256:$image_id"
          echo "digest=$digest" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: 🔐 Generate build attestation (frontend)
        uses: actions/attest-build-provenance@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.digest-frontend.outcome == 'success' && steps.digest-frontend.outputs.digest != ''
        continue-on-error: true
        with:
          subject-name: 'pandapal-frontend'
          subject-digest: '${{ steps.digest-frontend.outputs.digest }}'
          push-to-registry: false

  # Security: pip-audit на PR и main, bandit только на main
  security:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: 🔒 Audit dependencies (pip-audit)
        run: pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2025-71176

      - name: 🛡️ Security linting (bandit)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          bandit -r bot/ -f json -o bandit-report.json -ll --skip B101,B601 || true

      - name: 📋 Upload security reports
        uses: actions/upload-artifact@v4
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: security-reports
          path: bandit-report.json
          retention-days: 30

  # Deploy: Railway деплоит по push в main
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: Deploy (Railway GitHub integration)
        env:
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "::group::Deploy info"
          echo "Deploy: Railway auto-deploys on push to main (GitHub integration)"
          echo "Commit: $COMMIT_SHA"
          echo "Author: $COMMIT_AUTHOR"
          echo "Message: ${COMMIT_MSG:-n/a}"
          echo "::endgroup::"

      - name: ✅ Deploy ready
        run: |
          echo "::notice title=Deploy::Railway will deploy from this push. App URL: https://pandapal.ru"
          echo "Health: https://pandapal.ru/health"

  # Summary: Итоговый отчет
  summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - name: 📊 Print summary
        run: |
          echo "🐼 PandaPal Bot - CI/CD Summary"
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "✅ Pipeline completed"

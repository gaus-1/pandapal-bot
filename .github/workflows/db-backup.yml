# Database backup via pg_dump
# Runs every 12 hours, stores dump as GitHub artifact (retained 30 days)
#
# Required secrets:
#   DATABASE_PUBLIC_URL - PostgreSQL connection string (public endpoint from Railway)

name: Database Backup

on:
  schedule:
    # Every 12 hours: midnight and noon UTC
    - cron: '0 0,12 * * *'
  workflow_dispatch: # manual trigger

jobs:
  backup:
    name: PostgreSQL Backup
    runs-on: ubuntu-latest
    container:
      image: postgres:16
      options: --user root
    timeout-minutes: 15

    steps:
      - name: Install bash
        run: |
          apt-get update -qq && apt-get install -y -qq bash curl > /dev/null 2>&1

      - name: Create database dump
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
        run: |
          set -euo pipefail

          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="pandapal_backup_${TIMESTAMP}.sql.gz"

          # Use raw URL from secrets (modifying it can break Railway Maglev proxy SNI)
          DB_URL="$DATABASE_URL"

          echo "Starting backup at $(date -u)"

          # Retry logic: up to 3 attempts with exponential backoff
          MAX_RETRIES=3
          RETRY=0
          SUCCESS=false

          while [ "$RETRY" -lt "$MAX_RETRIES" ]; do
            RETRY=$((RETRY + 1))
            echo "Attempt $RETRY/$MAX_RETRIES..."

            if pg_dump "$DB_URL" \
              -v \
              --no-owner \
              --no-privileges \
              --clean \
              --if-exists \
              --format=plain \
              | gzip > "$FILENAME"; then

              FILESIZE=$(stat --printf="%s" "$FILENAME" 2>/dev/null || stat -f%z "$FILENAME")
              if [ "$FILESIZE" -ge 1000 ]; then
                SUCCESS=true
                break
              else
                echo "::warning::Attempt $RETRY: file too small ($FILESIZE bytes), retrying..."
              fi
            else
              echo "::warning::Attempt $RETRY: pg_dump failed (exit $?), retrying..."
            fi

            # Exponential backoff: 10s, 20s, 40s
            SLEEP=$((10 * (2 ** (RETRY - 1))))
            echo "Sleeping ${SLEEP}s before retry..."
            sleep "$SLEEP"
          done

          if [ "$SUCCESS" != "true" ]; then
            FILESIZE=$(stat --printf="%s" "$FILENAME" 2>/dev/null || echo "0")
            echo "::error::Backup failed after $MAX_RETRIES attempts (last file: $FILESIZE bytes)"
            exit 1
          fi

          echo "Backup complete: $FILENAME ($FILESIZE bytes)"
          echo "BACKUP_FILE=$FILENAME" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30

      - name: Notify on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.ADMIN_TELEGRAM_ID }}
        run: |
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="⚠️ Database backup FAILED at $(date -u +%H:%M) after 3 retries" \
              -d parse_mode="HTML"
          fi
